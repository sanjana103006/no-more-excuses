<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No More Excuses | Habit Tracker</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --dark: #2d3436;
            --light: #f7f1e3;
            --success: #1dd1a1;
            --gray: #636e72;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-weight: 800;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: var(--gray);
            font-size: 0.9rem;
        }

        /* Input Area */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px;
            border-radius: 8px;
            border: none;
            background: #444;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        button#add-btn {
            padding: 0 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button#add-btn:active {
            transform: scale(0.95);
        }

        /* Habit List */
        ul {
            list-style: none;
            padding: 0;
        }

        .habit-item {
            background: #3d4649;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border-left: 5px solid var(--gray);
        }

        .habit-item.completed {
            border-left: 5px solid var(--success);
            background: #2f3a36;
        }

        .habit-info {
            display: flex;
            flex-direction: column;
        }

        .habit-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .streak-count {
            font-size: 0.8rem;
            color: var(--gray);
            margin-top: 4px;
        }

        .streak-count span {
            color: #ff9f43;
            font-weight: bold;
        }

        /* Checkbox Styling */
        .check-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid var(--gray);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            transition: all 0.2s;
        }

        .habit-item.completed .check-btn {
            background-color: var(--success);
            border-color: var(--success);
            color: var(--dark);
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: #555;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 15px;
        }
        
        .delete-btn:hover {
            color: var(--primary);
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>No More Excuses</h1>
            <p class="subtitle">Don't break the chain.</p>
        </header>

        <div class="input-group">
            <input type="text" id="habit-input" placeholder="Enter a new habit...">
            <button id="add-btn">ADD</button>
        </div>

        <ul id="habit-list">
            <!-- Habits will appear here -->
        </ul>
    </div>

    <script>
        // 1. Select Elements
        const habitInput = document.getElementById('habit-input');
        const addBtn = document.getElementById('add-btn');
        const habitList = document.getElementById('habit-list');

        // 2. Load habits from LocalStorage on startup
        let habits = JSON.parse(localStorage.getItem('noMoreExcusesHabits')) || [];

        // 3. Helper: Get today's date as a string (YYYY-MM-DD) to avoid time issues
        const getTodayString = () => {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        };

        // 4. Helper: Get yesterday's date string
        const getYesterdayString = () => {
            const d = new Date();
            d.setDate(d.getDate() - 1);
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        };

        // 5. Render the list
        function renderHabits() {
            habitList.innerHTML = '';
            const today = getTodayString();
            const yesterday = getYesterdayString();

            habits.forEach((habit, index) => {
                const li = document.createElement('li');
                li.className = `habit-item ${habit.lastCompleted === today ? 'completed' : ''}`;
                
                // Streak Text Logic
                let streakText = "Start today!";
                if(habit.lastCompleted === today) streakText = "Done for today! 🔥";
                else if(habit.lastCompleted === yesterday) streakText = "Don't break the streak!";
                else if(habit.streak > 0) streakText = "Streak broken. Start again.";

                li.innerHTML = `
                    <div class="habit-info">
                        <span class="habit-name">${habit.name}</span>
                        <div class="streak-count">
                            ${habit.streak > 0 ? `Current Streak: <span>${habit.streak} days 🔥</span>` : streakText}
                        </div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <button class="check-btn" onclick="toggleHabit(${index})">✓</button>
                        <button class="delete-btn" onclick="deleteHabit(${index})">×</button>
                    </div>
                `;
                habitList.appendChild(li);
            });
        }

        // 6. Add Habit Function
        function addHabit() {
            const name = habitInput.value.trim();
            if (name === '') return;

            const newHabit = {
                name: name,
                streak: 0,
                lastCompleted: null
            };

            habits.push(newHabit);
            saveAndRender();
            habitInput.value = '';
        }

        // 7. Toggle Habit (Complete) Function
        window.toggleHabit = function(index) {
            const today = getTodayString();
            const yesterday = getYesterdayString();
            
            // If already done today, do nothing (or you could allow undoing)
            if (habits[index].lastCompleted === today) return;

            // Logic for streak calculation
            if (habits[index].lastCompleted === yesterday) {
                // Consecutive day!
                habits[index].streak += 1;
            } else {
                // First time or broken streak -> Start at 1
                habits[index].streak = 1;
            }

            habits[index].lastCompleted = today;
            saveAndRender();
        };

        // 8. Delete Function
        window.deleteHabit = function(index) {
            habits.splice(index, 1);
            saveAndRender();
        };

        // 9. Save to LocalStorage
        function saveAndRender() {
            localStorage.setItem('noMoreExcusesHabits', JSON.stringify(habits));
            renderHabits();
        }

        // Event Listeners
        addBtn.addEventListener('click', addHabit);
        habitInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addHabit();
        });

        // Initial Render
        renderHabits();

    </script>
</body>
</html>
